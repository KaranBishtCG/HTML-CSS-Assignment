<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CG Infinity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-page">

        <div class="login-left">
            <div class="login-brand">CG Infinity</div>
            <h2>Welcome back</h2>
            <p>Sign in to your account to continue.</p>

            <form class="login-form" action="userhome.html">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-row">
                    <label class="remember">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <p class="login-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>

        <div class="login-right">
            <div class="login-right-content">
                <h3>Transforming Ideas into <span>Human-Centric</span> Reality</h3>
                <p>Engineering human-centric technology for global leaders across Finance, Healthcare, and Retail sectors.</p>
            </div>
        </div>

    </div>

</body>
</html>
